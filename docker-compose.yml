services:
  pipelineforge-worker:
    build:
      context: .
      dockerfile: src/PipelineForge.Workers/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      - AzureServiceBus__ConnectionString=${SERVICEBUS_CONNECTION_STRING}
      - AzureDevOps__OrganisationUrl=${ADO_ORG_URL}
      - AzureDevOps__PersonalAccessToken=${ADO_PAT}
      - KeyVault__Uri=${KEYVAULT_URI}
      - OpenTelemetry__ConnectionString=${APPINSIGHTS_CONNECTION_STRING}
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards

volumes:
  grafana-data:
